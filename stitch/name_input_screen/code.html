<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2e69ff",
                        "background-light": "#f5f6f8",
                        "background-dark": "#0f1523",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .bg-gradient-mesh {
            background-color: #f5f6f8;
            background-image: 
                radial-gradient(at 0% 0%, rgba(46, 105, 255, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(46, 105, 255, 0.1) 0px, transparent 50%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display bg-background-light dark:bg-background-dark min-h-screen flex flex-col items-center justify-center p-4 bg-gradient-mesh">
<div class="w-full max-w-md flex flex-col items-center">
<!-- Header / Logo Area -->
<div class="flex items-center justify-between w-full mb-12 px-2">
<div class="text-slate-900 dark:text-slate-100 flex size-10 shrink-0 items-center justify-center bg-white dark:bg-slate-800 rounded-full shadow-sm cursor-pointer">
<span class="material-symbols-outlined">arrow_back</span>
</div>
<div class="text-primary font-bold text-2xl tracking-tight">4xMil</div>
<div class="size-10"></div> <!-- Spacer for symmetry -->
</div>
<!-- Premium Glassmorphism Card -->
<div class="glass-card w-full rounded-xl p-8 shadow-2xl shadow-primary/10">
<div class="flex flex-col gap-8">
<!-- Title Section -->
<div class="space-y-2 text-center">
<h1 class="text-slate-900 dark:text-slate-100 text-3xl font-bold leading-tight tracking-tight">
                        What is your name?
                    </h1>
<p class="text-slate-500 dark:text-slate-400 text-sm">
                        Let's get started on your journey to 4xMil.
                    </p>
</div>
<!-- Input Field Section -->
<div class="relative group">
<label class="block text-xs font-semibold text-primary uppercase tracking-wider mb-2 ml-1">
                        Full Name
                    </label>
<div class="relative">
<input class="form-input flex w-full rounded-xl text-slate-900 dark:text-slate-100 border-slate-200 dark:border-slate-700 bg-white/50 dark:bg-slate-900/50 focus:ring-2 focus:ring-primary focus:border-primary h-14 px-5 text-lg font-medium transition-all duration-200 placeholder:text-slate-400" placeholder="Enter your name" type="text" value=""/>
<div class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400">
<span class="material-symbols-outlined">person</span>
</div>
</div>
</div>
<!-- CTA Button -->
<div class="pt-4">
<button class="flex w-full cursor-pointer items-center justify-center overflow-hidden rounded-xl h-14 px-8 bg-primary text-white text-lg font-bold shadow-lg shadow-primary/30 hover:shadow-primary/40 active:scale-[0.98] transition-all duration-200">
<span class="truncate">Continue</span>
<span class="material-symbols-outlined ml-2 text-xl">arrow_forward</span>
</button>
</div>
</div>
</div>
<!-- Decorative Footer Element -->
<div class="mt-12 flex items-center gap-2">
<div class="h-1.5 w-8 rounded-full bg-primary"></div>
<div class="h-1.5 w-1.5 rounded-full bg-primary/30"></div>
<div class="h-1.5 w-1.5 rounded-full bg-primary/30"></div>
<div class="h-1.5 w-1.5 rounded-full bg-primary/30"></div>
</div>
</div>
<!-- Background Decoration Images -->
<div class="fixed top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-primary/5 blur-[100px] -z-10"></div>
<div class="fixed bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-primary/10 blur-[100px] -z-10"></div>
</body></html>
