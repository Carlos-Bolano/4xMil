<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>4xMil - Onboarding</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2e69ff",
                        "background-light": "#f5f6f8",
                        "background-dark": "#0f1523",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "2xl": "24px", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased">
<div class="relative flex min-h-screen w-full flex-col items-center justify-center p-4 overflow-x-hidden">
<!-- Background Accents -->
<div class="fixed top-[-10%] left-[-10%] w-[50%] h-[50%] bg-primary/10 rounded-full blur-[100px]"></div>
<div class="fixed bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-primary/20 rounded-full blur-[100px]"></div>
<!-- Main Card Container -->
<div class="glass relative z-10 w-full max-w-md rounded-2xl p-8 shadow-2xl flex flex-col items-center">
<!-- Top App Bar Mockup -->
<div class="flex items-center w-full mb-8">
<div class="flex-1"></div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight">4xMil</h2>
<div class="flex-1 flex justify-end">
<button class="text-primary text-sm font-semibold">Skip</button>
</div>
</div>
<!-- Illustration Container -->
<div class="w-full aspect-square rounded-xl overflow-hidden bg-gradient-to-br from-primary/5 to-primary/20 flex items-center justify-center relative mb-8">
<div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] opacity-10"></div>
<div class="relative flex flex-col items-center">
<span class="material-symbols-outlined text-primary text-[80px] mb-4">payments</span>
<div class="flex gap-2">
<div class="h-12 w-24 bg-white/80 rounded-lg shadow-sm border border-primary/10 flex items-center justify-center">
<div class="h-2 w-16 bg-primary/20 rounded"></div>
</div>
<div class="h-12 w-24 bg-primary rounded-lg shadow-lg flex items-center justify-center">
<div class="h-2 w-12 bg-white/40 rounded"></div>
</div>
</div>
</div>
<div class="absolute inset-0" data-alt="Minimalist digital finance banking abstract illustration"></div>
</div>
<!-- Content Area -->
<div class="text-center space-y-4">
<h1 class="text-slate-900 dark:text-slate-100 text-[28px] font-bold leading-tight px-2">
                    Calculate the 4x1000 in seconds
                </h1>
<p class="text-slate-600 dark:text-slate-400 text-base font-normal leading-relaxed">
                    Enter any amount of money and instantly see how much the 4x1000 tax will be.
                </p>
</div>
<!-- Progress Indicators -->
<div class="flex w-full flex-row items-center justify-center gap-2.5 py-8">
<div class="h-1.5 w-6 rounded-full bg-primary"></div>
<div class="h-1.5 w-1.5 rounded-full bg-slate-300 dark:bg-slate-700"></div>
<div class="h-1.5 w-1.5 rounded-full bg-slate-300 dark:bg-slate-700"></div>
</div>
<!-- Action Button -->
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 px-6 rounded-xl transition-all shadow-lg shadow-primary/25 active:scale-[0.98] flex items-center justify-center gap-2">
                Continue
                <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
<!-- Bottom Spacer -->
<div class="h-2"></div>
</div>
<!-- Footer / Credits -->
<p class="mt-8 text-slate-400 text-xs font-medium">Safe • Secure • Accurate</p>
</div>
</body></html>
